name: Compute Image Metadata

on:
  push:
    branches: [main]
    paths:
      - "public/data/gallery.json"

jobs:
  compute-metadata:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's own commits
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache installed packages
        uses: actions/cache@v4
        id: pip-cache
        with:
          path: ${{ env.pythonLocation }}
          key: pip-installed-${{ runner.os }}-py3.12-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install dependencies
        if: steps.pip-cache.outputs.cache-hit != 'true'
        run: pip install -r scripts/requirements.txt

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-siglip-base-patch16-224-dinov2-small

      - name: Cache torchvision models
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/hub/checkpoints
          key: torchvision-vgg16

      - name: Compute missing image metadata
        env:
          PYTHONUNBUFFERED: "1"
          COMIC_VINE_API_KEY: ${{ secrets.COMIC_VINE_API_KEY }}
          METRON_USERNAME: ${{ secrets.METRON_USERNAME }}
          METRON_PASSWORD: ${{ secrets.METRON_PASSWORD }}
        run: python scripts/compute-image-metadata.py --skip-gcd

      - name: Compute embeddings
        run: python scripts/compute-embeddings.py

      # - name: Compute text embeddings
      #   run: python scripts/compute-text-embeddings.py

      - name: Commit updated data
        run: |
          git add public/data/gallery.json public/data/embeddings.json public/data/embeddings-dino.json public/data/embeddings-gram.json public/data/artists.json public/data/series.json
          [ -f public/data/disambiguation.json ] && git add public/data/disambiguation.json
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update image metadata and embeddings"
          git pull --rebase
          git push

      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });