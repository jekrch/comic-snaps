name: Compute Image Metadata

on:
  push:
    branches: [main]
    paths:
      - "public/data/gallery.json"

jobs:
  compute-metadata:
    runs-on: ubuntu-latest
    # Skip runs triggered by the bot's own commits
    if: github.actor != 'github-actions[bot]'
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-siglip-base-patch16-224-dinov2-small

      - name: Cache torchvision models
        uses: actions/cache@v4
        with:
          path: ~/.cache/torch/hub/checkpoints
          key: torchvision-vgg16

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Compute missing image metadata
        run: python scripts/compute-image-metadata.py

      - name: Compute embeddings
        run: python scripts/compute-embeddings.py

      - name: Commit updated data
        run: |
          git add public/data/gallery.json public/data/embeddings.json public/data/embeddings-dino.json public/data/embeddings-gram.json
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update image metadata and embeddings"
          git push

      - name: Trigger deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main'
            });