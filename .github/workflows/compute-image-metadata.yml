name: Compute Image Metadata

on:
  push:
    branches: [main]
    paths:
      - "public/data/gallery.json"

jobs:
  compute-metadata:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Hugging Face models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-clip-vit-base-patch32

      - name: Install dependencies
        run: |
          pip install Pillow imagehash scikit-learn scikit-image numpy
          pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu
          pip install transformers

      - name: Compute missing image metadata
        run: python scripts/compute-image-metadata.py

      - name: Compute missing CLIP embeddings
        run: python scripts/compute-embeddings.py

      - name: Commit updated data
        run: |
          git add public/data/gallery.json public/data/embeddings.json
          git diff --cached --quiet && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Update image metadata and embeddings"
          git push